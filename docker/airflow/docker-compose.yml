services:
  postgres:
    image: postgres:15
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_init
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__SCHEDULER__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin || true
      "

  airflow-webserver:
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__SCHEDULER__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
    command: airflow webserver

  airflow-scheduler:
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__SCHEDULER__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
    command: airflow scheduler

volumes:
  postgres_data:
