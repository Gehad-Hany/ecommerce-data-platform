services:
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_init
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/runtime/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
      - ./runtime:/opt/airflow/runtime
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin || true
      "

  airflow-webserver:
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/runtime/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
      - ./runtime:/opt/airflow/runtime
    command: airflow webserver --workers 1 --worker-timeout 300

  airflow-scheduler:
    image: ecommerce-airflow:latest
    container_name: ecommerce_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/runtime/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ecommerce_airflow_local_secret
      DBT_PROFILES_DIR: /home/airflow/.dbt
      ECOMMERCE_PROJECT_DIR: /opt/airflow/ecommerce-data-platform
    volumes:
      - ../../:/opt/airflow/ecommerce-data-platform
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./profiles:/home/airflow/.dbt
      - ./runtime:/opt/airflow/runtime
    command: airflow scheduler
